<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>UTC / Unix Clock</h1>
      <button id="settings-toggle" class="settings-toggle" title="Settings">&#9881;</button>
    </div>

    <div id="settings-panel" class="settings-panel" style="display:none">
      <div class="setting-row">
        <span class="setting-label">Theme</span>
        <select id="theme-select">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Format</span>
        <select id="format-select">
          <option value="iso-short">ISO Short</option>
          <option value="iso">ISO 8601</option>
          <option value="rfc2822">RFC 2822</option>
        </select>
      </div>
    </div>

    <section class="time-block">
      <label>UTC</label>
      <div class="copyable-row">
        <div id="utc-time" class="time-value" title="Click to copy"></div>
        <span class="copy-feedback">Copied!</span>
      </div>
      <label>LOCAL</label>
      <div class="copyable-row">
        <div id="local-time" class="time-value" title="Click to copy"></div>
        <span class="copy-feedback">Copied!</span>
      </div>
      <label>EPOCH</label>
      <div class="epoch-row">
        <span id="unix-epoch" class="epoch-value" title="Click to copy"></span>
        <span id="copy-feedback" class="copy-feedback">Copied!</span>
      </div>
    </section>

    <section class="time-block">
      <div class="tz-header">
        <select id="tz-select"></select>
      </div>
      <div class="copyable-row">
        <div id="tz-time" class="time-value" title="Click to copy"></div>
        <span class="copy-feedback">Copied!</span>
      </div>
      <div class="tz-meta">
        <span id="tz-offset" class="offset-value"></span>
        <span id="tz-daynight" class="daynight-icon"></span>
      </div>
    </section>

    <section class="time-block">
      <label>EPOCH CONVERTER</label>
      <input id="epoch-input" type="text" placeholder="Enter unix timestamp..." />
      <div id="convert-results" class="convert-results" style="display:none">
        <div id="convert-relative" class="relative-time"></div>
        <label>UTC</label>
        <div class="copyable-row">
          <div id="convert-utc" class="time-value" title="Click to copy"></div>
          <span class="copy-feedback">Copied!</span>
        </div>
        <label>LOCAL</label>
        <div class="copyable-row">
          <div id="convert-local" class="time-value" title="Click to copy"></div>
          <span class="copy-feedback">Copied!</span>
        </div>
      </div>
    </section>
    <footer id="version" class="version"></footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
