<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>UTC / Unix Clock</h1>
      <button id="settings-toggle" class="settings-toggle" title="Settings">&#9881;</button>
    </div>

    <div id="settings-panel" class="settings-panel" style="display:none">
      <div class="setting-row">
        <span class="setting-label">Theme</span>
        <select id="theme-select">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Time</span>
        <select id="hour-select">
          <option value="24h">24-hour</option>
          <option value="12h">12-hour</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Date</span>
        <select id="date-format-select">
          <option value="YYYY-MM-DD">YYYY-MM-DD</option>
          <option value="DD/MM/YYYY">DD/MM/YYYY</option>
          <option value="MM/DD/YYYY">MM/DD/YYYY</option>
        </select>
      </div>
    </div>

    <section class="time-block">
      <label id="utc-label">UTC</label>
      <div id="utc-time" class="time-value"></div>
      <div class="epoch-row">
        <span id="unix-epoch" class="epoch-value" title="Click to copy"></span>
        <span id="copy-feedback" class="copy-feedback">Copied!</span>
      </div>
    </section>

    <section class="time-block">
      <div class="tz-header">
        <select id="tz-select"></select>
      </div>
      <div id="tz-time" class="time-value"></div>
      <div id="tz-offset" class="offset-value"></div>
    </section>

    <section class="time-block">
      <label>EPOCH CONVERTER</label>
      <input id="epoch-input" type="text" placeholder="Enter unix timestamp..." />
      <div id="convert-results" class="convert-results" style="display:none">
        <div class="convert-row">
          <span class="convert-label">UTC</span>
          <span id="convert-utc" class="convert-value" title="Click to copy"></span>
          <span class="copy-feedback" data-for="convert-utc">Copied!</span>
        </div>
        <div class="convert-row">
          <span class="convert-label">Local</span>
          <span id="convert-local" class="convert-value" title="Click to copy"></span>
          <span class="copy-feedback" data-for="convert-local">Copied!</span>
        </div>
      </div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
